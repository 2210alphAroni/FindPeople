<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- Outer ping ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
